services:
  solesonic-llm-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: solesonic-llm-ui:latest
    container_name: solesonic-llm-ui
    restart: unless-stopped

    # Host Nginx owns :80/:443. Publish the container only on localhost.
    ports:
      - "127.0.0.1:3000:80"

    # Optional: persist container Nginx logs somewhere that won't collide with host Nginx logs
    volumes:
      - /var/log/solesonic-llm-ui-nginx:/var/log/nginx

    env_file:
      - ./.env
    environment:
      TZ: ${TZ:-UTC}

    networks:
      - solesonic-llm-network

networks:
  solesonic-llm-network:
    driver: bridge